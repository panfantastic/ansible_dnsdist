---
# tasks file for dnsdist
- name: Install dnsdist and deps
  package:
    name: "{{ item }}"
    state: present
  loop:
    - dnsdist
    - python3-lmdb
    - liblmdb-dev
    - liblmdb0
  become: true

- name: Template scripts
  template:
    src: "{{ item }}.j2"
    dest: "/etc/dnsdist/{{ item }}"
    owner: root
    group: root
    mode: "0750"
    lstrip_blocks: yes
  loop:
    - "blocklist_fetch.sh"
    - "blocklist_update.sh"
    - "mmap_create.py"
    - "mmap_update.py"
  become: true

- name: Upload custom blocklist
  template:
    src: "{{ lookup('first_found', dnsdist_custom_txt) }}"
    dest: /etc/dnsdist/lists/custom.txt
    owner: root
    group: root
    mode: "0644"
    lstrip_blocks: yes
  vars:
    dnsdist_custom_txt:
      files:
        - "custom.txt.j2"
      paths:
        - "{{ playbook_dir }}/templates/{{ ansible_facts['hostname'] }}"
        - "{{ playbook_dir }}/templates"
        - "{{ role_path }}/templates"
  become: true

- name: Check if blocklist lmdb already exists
  stat:
    path: "/etc/dnsdist/blocklist.lmdb"
  register: blocklist_lmdb

- name: Run blocklist creation
  command: "/etc/dnsdist/{{ item }}"
  loop:
    - "blocklist_fetch.sh"
    - "mmap_create.py"
  become: true
  when: blocklist_lmdb.stat.isdir is not defined

- name: Template dnsdist config, defaulting to the role's template last
  template:
    src: "{{ lookup('first_found', params) }}"
    dest: "/etc/dnsdist/dnsdist.conf"
    owner: root
    group: _dnsdist
    mode: "0640"
    lstrip_blocks: yes
  vars:
    params:
      files:
        - dnsdist.conf.j2
      paths:
        - "{{ playbook_dir }}/templates/{{ ansible_facts['hostname'] }}"
        - "{{ playbook_dir }}/templates"
        - "{{ role_path }}/templates"
  become: true
  notify:
    - check dnsdist config
    - restart dnsdist



